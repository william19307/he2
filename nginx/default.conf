# ── HTTP：全部跳转 HTTPS ──────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt 证书续期验证目录
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主服务 ──────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name your-domain.com;    # ← 替换为实际域名

    # SSL 证书（由 certbot 生成后挂载进来）
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全响应头
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── 静态前端 dist ─────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # SPA 入口必须禁用长期缓存，否则发版后浏览器仍可能用旧的 index.html 引用旧 hash 资源
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    # Vue Router history 模式：未匹配路径一律回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长缓存（hash 文件名，可安全设 1 年）
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API 反向代理到 Node.js ────────────────────
    location /api/ {
        proxy_pass         http://backend:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # 上传 / 报告下载请求超时适当放宽
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # 允许最大 body（与后端 express.json limit 一致）
        client_max_body_size 10m;
    }

    # ── 上传静态文件透传 ──────────────────────────
    location /uploads/ {
        proxy_pass http://backend:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
