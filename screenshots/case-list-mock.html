<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个案管理（界面示意）</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #1d2129; padding: 24px; }
    h1 { font-size: 20px; margin: 0 0 20px; font-weight: 600; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab { padding: 6px 16px; border-radius: 20px; background: #fff; border: 1px solid #e5e6eb; font-size: 14px; cursor: default; }
    .tab.on { background: #165dff; color: #fff; border-color: #165dff; }
    .search { margin-bottom: 16px; }
    .search input { width: 320px; max-width: 100%; padding: 8px 12px; border: 1px solid #e5e6eb; border-radius: 6px; font-size: 14px; }
    .card { background: #fff; border-radius: 8px; border: 1px solid #e5e6eb; padding: 16px; margin-bottom: 12px; }
    .row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .name { font-weight: 600; font-size: 15px; }
    .tag { font-size: 12px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
    .tag.urgent { background: #ffece8; color: #f53f3f; }
    .tag.high { background: #fff3e8; color: #ff7d00; }
    .tag.mid { background: #e8f3ff; color: #165dff; }
    .tag.low { background: #f2f3f5; color: #86909c; }
    .meta { font-size: 12px; color: #86909c; margin-bottom: 8px; }
    .summary { font-size: 13px; color: #4e5969; line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .foot { font-size: 12px; color: #86909c; margin-bottom: 12px; line-height: 1.6; }
    .btn { display: inline-block; padding: 6px 16px; background: #165dff; color: #fff; border-radius: 6px; font-size: 13px; border: none; cursor: default; }
  </style>
</head>
<body>
  <h1>个案管理</h1>
  <div class="tabs">
    <span class="tab on">进行中</span>
    <span class="tab">已结案</span>
  </div>
  <div class="search">
    <input type="text" placeholder="按学生姓名搜索" value="" readonly />
  </div>
  <div class="card">
    <div class="row1">
      <span class="name">李梦瑶</span>
      <span class="tag high">高</span>
    </div>
    <div class="meta">初二3班 · 学号 20230301015</div>
    <div class="summary">持续跟进抑郁情绪与睡眠问题，已与家长建立沟通机制，建议维持每周会谈……</div>
    <div class="foot">建档时间：2025-03-10 14:30:00<br>最近跟进：2025-03-18 09:15:00 · 跟进记录数：6</div>
    <span class="btn">查看详情</span>
  </div>
  <div class="card">
    <div class="row1">
      <span class="name">陈小雨</span>
      <span class="tag urgent">紧急</span>
    </div>
    <div class="meta">初一5班 · 学号 20240301008</div>
    <div class="summary">黄色预警转个案，关注自伤风险表述，已启动家校联动……</div>
    <div class="foot">建档时间：2025-03-12 11:00:00<br>最近跟进：2025-03-19 16:20:00 · 跟进记录数：3</div>
    <span class="btn">查看详情</span>
  </div>
</body>
</html>
