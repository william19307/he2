# 本地开发：一键启动 MySQL（与 .env 中 DATABASE_URL 一致）
# 使用：docker compose -f docker-compose.mysql.yml up -d
# 停止：docker compose -f docker-compose.mysql.yml down

services:
  mysql:
    image: mysql:8.0
    # 不设 container_name，避免与历史上已创建的 mentalhealth-mysql 重名冲突
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mentalhealth
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mentalhealth_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mentalhealth_mysql_data:
