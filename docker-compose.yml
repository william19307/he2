# 心理健康测评平台 · 生产部署
# 用法: docker compose up -d
# 更新: docker compose pull && docker compose up -d --build

services:

  # ── MySQL 数据库 ──────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-password}
      MYSQL_DATABASE: mentalhealth
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_allowed_packet=64M
      --innodb_buffer_pool_size=256M
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-uroot", "-p${MYSQL_ROOT_PASSWORD:-change-me-password}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - app_net

  # ── Node.js 后端 API ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - NODE_OPTIONS=--max-old-space-size=256
      # 覆盖 .env 中的 DATABASE_URL，指向内网 db 容器
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD:-change-me-password}@db:3306/mentalhealth
      - NODE_ENV=production
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - app_net

  # ── Nginx：静态资源 + 反向代理 ─────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - uploads:/app/uploads:ro
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - app_net

volumes:
  db_data:
  uploads:

networks:
  app_net:
    driver: bridge
